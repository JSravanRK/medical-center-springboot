# ===================================================
# Medical Center - Spring Boot Configuration
# ===================================================

# Server Port (change if 8080 is busy)
server.port=8080

# ===================================================
# MySQL Database Configuration
# UPDATE these values to match your MySQL setup
# ===================================================
spring.datasource.url=jdbc:mysql://localhost:3306/central_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===================================================
# JSP View Resolver
# ===================================================
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp

# ===================================================
# Session Configuration (30 min timeout like original)
# ===================================================
server.servlet.session.timeout=30m

# ===================================================
# Logging
# ===================================================
logging.level.com.medicalcenter=DEBUG
logging.level.org.springframework.web=INFO
